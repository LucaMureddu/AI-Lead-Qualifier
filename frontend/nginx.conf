# frontend/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Configurazione Nginx per il frontend in produzione Docker.
#
# Strategia:
#   - Serve i file statici compilati da Vite (dist/)
#   - Proxy trasparente delle chiamate API verso il container "backend"
#     (risolto via DNS interno Docker sul nome del servizio)
#   - SPA fallback: qualsiasi rotta non trovata restituisce index.html
#     (necessario per il routing client-side di Alpine.js)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── File statici ──────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Compressione gzip per JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache aggressiva per gli asset con hash nel nome (Vite li rinomina)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy API → backend ───────────────────────────────────────────────────
    # Tutte le rotte del backend FastAPI vengono inoltrate al servizio interno.
    # Il frontend viene compilato con VITE_API_BASE_URL="" (same-origin),
    # quindi le fetch partono da percorsi relativi come /qualify, /upload ecc.
    location ~ ^/(api|qualify|ingest|upload|token|tenants|health|docs|redoc|openapi.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Header necessari per FastAPI (IP reale del client, ecc.)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout più lunghi per le chiamate LLM (possono essere lente)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Qualsiasi percorso non risolto sopra → restituisce index.html.
    # Alpine.js gestisce il routing lato client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
