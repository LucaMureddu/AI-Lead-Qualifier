<!DOCTYPE html>
<html lang="it" class="h-full bg-slate-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogo Servizi — Prezzi Ibridi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- x-cloak prevents flash of unstyled Alpine content -->
  <style> [x-cloak] { display: none !important; } </style>
</head>

<body class="min-h-full font-sans antialiased text-slate-800">

<!-- ══════════════════════════════════════════════════════════════════════════
     GLOBAL TOAST CONTAINER
     Fixed top-right; auto-dismisses after push(). Enter animation only —
     leave is synchronous (item removed from array by setTimeout).
     ══════════════════════════════════════════════════════════════════════════ -->
<div
  x-data
  x-cloak
  class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80 pointer-events-none"
  aria-live="polite"
>
  <template x-for="toast in $store.toast.items" :key="toast.id">
    <div
      x-show="true"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-x-4"
      x-transition:enter-end="opacity-100 translate-x-0"
      :class="toast.type === 'success'
        ? 'border-l-4 border-emerald-500'
        : 'border-l-4 border-red-500'"
      class="pointer-events-auto bg-white rounded-md shadow-lg px-4 py-3
             flex items-start gap-2.5 ring-1 ring-black/5"
    >

      <!-- Icon: success -->
      <span x-show="toast.type === 'success'" class="flex-shrink-0 mt-0.5 text-emerald-500">
        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
      </span>

      <!-- Icon: error -->
      <span x-show="toast.type === 'error'" class="flex-shrink-0 mt-0.5 text-red-500">
        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
      </span>

      <!-- Message -->
      <p class="flex-1 text-xs leading-relaxed text-slate-700" x-text="toast.message"></p>

      <!-- Dismiss -->
      <button
        @click="$store.toast.remove(toast.id)"
        class="flex-shrink-0 mt-0.5 text-slate-300 hover:text-slate-500 transition-colors"
        :aria-label="'Chiudi notifica'"
      >
        <svg class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </button>

    </div>
  </template>
</div>


<!-- ══════════════════════════════════════════════════════════════════════════
     PAGE
     ══════════════════════════════════════════════════════════════════════════ -->
<main class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">

  <!-- Header -->
  <div class="flex items-end justify-between">
    <div>
      <h1 class="text-lg font-semibold tracking-tight text-slate-800">Catalogo Servizi</h1>
      <p class="mt-0.5 text-xs text-slate-400">
        Prezzi ibridi — <span class="font-medium text-blue-600">FIXED</span> ·
        <span class="font-medium text-emerald-600">FREE</span> ·
        <span class="font-medium text-amber-600">VARIABLE</span>.
        Salvataggio esplicito per riga; rollback automatico su HTTP 422.
      </p>
    </div>
    <!-- Optional: add "Nuovo servizio" CTA here -->
  </div>

  <!-- Table card -->
  <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm divide-y divide-slate-100">

        <!-- ── Head ─────────────────────────────────────────────────────── -->
        <thead class="bg-slate-50 text-xs font-medium text-slate-400 uppercase tracking-wider">
          <tr>
            <th class="pl-5 pr-3 py-3 text-left w-28">ID</th>
            <th class="px-3 py-3 text-left">Servizio</th>
            <th class="px-3 py-3 text-left w-40">Tipo</th>
            <th class="px-3 py-3 text-left w-40">Prezzo</th>
            <th class="px-3 py-3 text-left">Descrizione</th>
            <th class="px-3 pr-5 py-3 text-right w-36">Azioni</th>
          </tr>
        </thead>

        <!-- ── Body — catalogStore owns items[] + loading flag ──────────── -->
        <tbody x-data="catalogStore" class="divide-y divide-slate-100">

          <!-- Loading skeleton -->
          <tr x-show="loading" x-cloak>
            <td colspan="6" class="px-5 py-10 text-center">
              <svg class="animate-spin h-5 w-5 mx-auto text-slate-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              <p class="mt-2 text-xs text-slate-400">Caricamento catalogo…</p>
            </td>
          </tr>

          <!-- Empty state -->
          <tr x-show="!loading && items.length === 0">
            <td colspan="6" class="px-5 py-10 text-center text-xs text-slate-400">
              Nessun servizio nel catalogo. Esegui prima un'ingestione.
            </td>
          </tr>

          <!-- ── Data rows ─────────────────────────────────────────────── -->
          <template x-for="item in items" :key="item.id">
            <tr
              x-data="rowComponent(item)"
              :class="{
                'bg-amber-50  hover:bg-amber-100/60':    edit.price_type === 'VARIABLE',
                'bg-emerald-50 hover:bg-emerald-100/60': edit.price_type === 'FREE',
                'bg-white hover:bg-slate-50':            edit.price_type === 'FIXED',
              }"
              class="transition-colors duration-100"
            >

              <!-- ID (last 8 chars, full on hover) -->
              <td class="pl-5 pr-3 py-2.5">
                <code
                  class="text-xs text-slate-300 font-mono truncate block max-w-[5rem]"
                  :title="edit.id"
                  x-text="'…' + edit.id.slice(-8)"
                ></code>
              </td>

              <!-- Servizio -->
              <td class="px-3 py-2">
                <input
                  type="text"
                  x-model="edit.service"
                  :class="edit.service !== original.service
                    ? 'border-blue-300 bg-blue-50/60 ring-1 ring-blue-200'
                    : 'border-slate-200 bg-transparent'"
                  class="block w-full min-w-[10rem] rounded border px-2.5 py-1.5 text-sm
                         text-slate-800 placeholder:text-slate-300
                         focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                         transition-colors duration-100"
                  placeholder="Nome servizio"
                />
              </td>

              <!-- Tipo Prezzo -->
              <td class="px-3 py-2">
                <select
                  x-model="edit.price_type"
                  @change="onPriceTypeChange()"
                  :class="{
                    'border-amber-300   text-amber-700   bg-amber-50':    edit.price_type === 'VARIABLE',
                    'border-emerald-300 text-emerald-700 bg-emerald-50':  edit.price_type === 'FREE',
                    'border-slate-200   text-slate-800   bg-transparent': edit.price_type === 'FIXED',
                  }"
                  class="block w-full rounded border px-2.5 py-1.5 text-sm font-medium cursor-pointer
                         focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                         transition-colors duration-100"
                >
                  <option value="FIXED">FIXED</option>
                  <option value="FREE">FREE</option>
                  <option value="VARIABLE">VARIABLE</option>
                </select>
              </td>

              <!-- Prezzo — conditional rendering per price_type invariant -->
              <td class="px-3 py-2">

                <!-- VARIABLE → "Su richiesta" badge, price=null -->
                <span
                  x-show="edit.price_type === 'VARIABLE'"
                  class="inline-flex items-center gap-1.5 rounded-full bg-amber-100 text-amber-700
                         text-xs px-2.5 py-1 font-medium whitespace-nowrap"
                >
                  <svg class="h-3 w-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  Su richiesta
                </span>

                <!-- FREE → "Gratis" badge, price=0 (read-only) -->
                <span
                  x-show="edit.price_type === 'FREE'"
                  class="inline-flex items-center gap-1.5 rounded-full bg-emerald-100 text-emerald-700
                         text-xs px-2.5 py-1 font-medium whitespace-nowrap"
                >
                  <svg class="h-3 w-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                  Gratis
                </span>

                <!-- FIXED → numeric input with € suffix -->
                <div x-show="edit.price_type === 'FIXED'" class="relative">
                  <input
                    type="number"
                    min="0"
                    step="0.01"
                    x-model.number="edit.price"
                    :class="(edit.price ?? null) !== (original.price ?? null)
                      ? 'border-blue-300 bg-blue-50/60 ring-1 ring-blue-200'
                      : 'border-slate-200 bg-transparent'"
                    class="block w-full rounded border pl-2.5 pr-7 py-1.5 text-sm text-slate-800
                           placeholder:text-slate-300
                           focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                           transition-colors duration-100
                           [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                    placeholder="0.00"
                  />
                  <span class="absolute inset-y-0 right-2.5 flex items-center pointer-events-none text-xs text-slate-400 select-none">€</span>
                </div>

              </td>

              <!-- Descrizione -->
              <td class="px-3 py-2">
                <input
                  type="text"
                  x-model="edit.description"
                  :class="(edit.description ?? '') !== (original.description ?? '')
                    ? 'border-blue-300 bg-blue-50/60 ring-1 ring-blue-200'
                    : 'border-slate-200 bg-transparent'"
                  class="block w-full rounded border px-2.5 py-1.5 text-sm text-slate-500
                         placeholder:text-slate-300
                         focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500
                         transition-colors duration-100"
                  placeholder="—"
                />
              </td>

              <!-- Azioni -->
              <td class="px-3 pr-5 py-2 text-right">
                <div class="inline-flex items-center justify-end gap-1.5">

                  <!-- ✓ Success flash (2 s) -->
                  <span
                    x-show="_savedFeedback"
                    x-transition:enter="transition ease-out duration-150"
                    x-transition:enter-start="opacity-0 scale-75"
                    x-transition:enter-end="opacity-100 scale-100"
                    x-transition:leave="transition ease-in duration-100"
                    x-transition:leave-start="opacity-100"
                    x-transition:leave-end="opacity-0"
                    class="text-emerald-500"
                    title="Salvato"
                  >
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                  </span>

                  <!-- ── Salva ── -->
                  <button
                    @click="save()"
                    :disabled="!isDirty || isSaving"
                    :class="isDirty && !isSaving
                      ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm cursor-pointer'
                      : 'bg-slate-100 text-slate-300 cursor-not-allowed'"
                    class="inline-flex items-center gap-1 rounded px-2.5 py-1.5 text-xs font-medium
                           transition-all duration-100
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
                    title="Salva modifiche"
                  >
                    <!-- Spinner while in-flight -->
                    <svg x-show="isSaving" class="animate-spin h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                    </svg>
                    <!-- Floppy / save icon -->
                    <svg x-show="!isSaving" class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                      <path d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V6h5a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h5v5.586l-1.293-1.293z"/>
                    </svg>
                    <span x-text="isSaving ? 'Salvataggio…' : 'Salva'"></span>
                  </button>

                  <!-- ── Reset ── -->
                  <button
                    @click="discard()"
                    :disabled="!isDirty || isSaving"
                    :class="isDirty && !isSaving
                      ? 'border-slate-200 text-slate-500 hover:bg-slate-100 cursor-pointer'
                      : 'border-slate-100 text-slate-300 cursor-not-allowed'"
                    class="inline-flex items-center gap-1 rounded border px-2.5 py-1.5 text-xs font-medium
                           transition-all duration-100
                           focus:outline-none focus:ring-2 focus:ring-slate-300 focus:ring-offset-1"
                    title="Annulla modifiche"
                  >
                    <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                    Reset
                  </button>

                </div>
              </td>

            </tr>
          </template>

        </tbody>
      </table>
    </div><!-- /overflow-x-auto -->
  </div><!-- /card -->

</main><!-- /page -->


<!-- ══════════════════════════════════════════════════════════════════════════
     SCRIPTS
     Module script MUST appear before the Alpine CDN tag — both are deferred,
     so they execute in document order. The module script registers the store,
     catalogStore, and rowComponent before Alpine processes the DOM.
     ══════════════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { patchCatalogueItem, listCatalogueItems } from './api.js';

  // ── 1. Global Toast Store ──────────────────────────────────────────────────
  document.addEventListener('alpine:init', () => {

    /**
     * Alpine.store('toast') — lightweight notification bus.
     *
     * Usage:
     *   Alpine.store('toast').success('Tutto ok.');
     *   Alpine.store('toast').error('Errore 422 vincolo DB.');
     */
    Alpine.store('toast', {
      items:   [],
      _nextId: 0,

      /**
       * @param {'success'|'error'} type
       * @param {string}            message
       * @param {number}            [ttl=5000]  Auto-dismiss in ms.
       */
      push(type, message, ttl = 5000) {
        const id = ++this._nextId;
        this.items.push({ id, type, message });
        setTimeout(() => this.remove(id), ttl);
      },

      success(msg) { this.push('success', msg, 4000); },
      error(msg)   { this.push('error',   msg, 7000); },
      remove(id)   { this.items = this.items.filter(t => t.id !== id); },
    });

    // ── 2. Catalogue Store (owns items[] + loading) ────────────────────────
    /**
     * x-data="catalogStore" on <tbody>.
     * Loads items from GET /api/catalog/items on init.
     */
    Alpine.data('catalogStore', () => ({
      items:   [],
      loading: true,

      async init() {
        try {
          const page = await listCatalogueItems(0, 200);
          this.items = page.items ?? page;   // support both { items: [] } and plain array
        } catch (err) {
          Alpine.store('toast').error(`Impossibile caricare il catalogo: ${err.message}`);
        } finally {
          this.loading = false;
        }
      },
    }));

  }); // alpine:init


  // ── 3. Row Component Factory ───────────────────────────────────────────────
  /**
   * window.rowComponent — Alpine component factory for a single catalogue row.
   * Called as x-data="rowComponent(item)" inside x-for.
   *
   * State contract:
   *   original        — deep clone of server data; never mutated until 200 OK
   *   edit            — reactive clone bound to inputs via x-model
   *   isDirty         — true when edit ≠ original (field-by-field, null-safe)
   *   isSaving        — true while PATCH in-flight (disables action buttons)
   *   _savedFeedback  — flash ✓ icon for 2 s after successful save
   *
   * Pricing invariants (mirror backend CHECK constraint):
   *   FIXED    → price ≥ 0.0, numeric input
   *   FREE     → price coerced to 0.0, read-only badge
   *   VARIABLE → price coerced to null, "Su richiesta" badge
   *
   * Anti-pattern avoided:
   *   NO auto-save on @change — only explicit "Salva" button triggers PATCH.
   *   This prevents flooding the backend with 422s on intermediate states
   *   (e.g. FIXED selected but price field not yet filled in).
   *
   * Security:
   *   console.error logs only itemId and HTTP status — never the full payload.
   *
   * @param {Object} item  Catalogue item from GET /api/catalog/items
   */
  window.rowComponent = function rowComponent(item) {
    return {

      original:       structuredClone(item),
      edit:           structuredClone(item),
      isSaving:       false,
      _savedFeedback: false,

      // ── Computed ─────────────────────────────────────────────────────────

      get isDirty() {
        const norm = (v) => (v == null || v === '') ? null : v;   // null-safe normalizer
        return (
          this.edit.service                    !== this.original.service          ||
          this.edit.price_type                 !== this.original.price_type       ||
          norm(this.edit.price)                !== norm(this.original.price)      ||
          norm(this.edit.description)          !== norm(this.original.description)
        );
      },

      // ── Handlers ─────────────────────────────────────────────────────────

      /**
       * Coerce edit.price when the user changes price_type.
       * Runs before any PATCH so the UI stays consistent with the DB invariant.
       */
      onPriceTypeChange() {
        switch (this.edit.price_type) {
          case 'VARIABLE':
            this.edit.price = null;
            break;
          case 'FREE':
            this.edit.price = 0;
            break;
          case 'FIXED':
            // Coming from VARIABLE: clear null so the user types a real value
            if (this.edit.price === null) this.edit.price = '';
            break;
        }
      },

      /** Discard local edits — restore to last confirmed server snapshot. */
      discard() {
        this.edit = structuredClone(this.original);
      },

      /**
       * PATCH the row.
       *
       * Success (2xx): sync original from server response, flash ✓, toast.
       * 422 (CheckViolationError): rollback edit → original, toast error.
       * Other errors: toast error, no rollback (edit preserved so user can retry).
       */
      async save() {
        if (!this.isDirty || this.isSaving) return;
        this.isSaving = true;

        // Build minimal payload — only send changed fields.
        // Pricing fields always travel together to satisfy CHECK constraint atomically.
        const payload = {};

        if (this.edit.service !== this.original.service) {
          payload.service = this.edit.service;
        }

        const descEdited   = this.edit.description?.trim()   || null;
        const descOriginal = this.original.description?.trim() || null;
        if (descEdited !== descOriginal) {
          payload.description = descEdited;
        }

        const priceDirty =
          this.edit.price_type !== this.original.price_type ||
          (this.edit.price ?? null) !== (this.original.price ?? null);

        if (priceDirty) {
          payload.price_type = this.edit.price_type;
          payload.price =
            this.edit.price_type === 'VARIABLE' ? null
          : this.edit.price_type === 'FREE'     ? 0
          : parseFloat(this.edit.price);
        }

        try {
          const updated = await patchCatalogueItem(this.edit.id, payload);

          // Sync original from server (captures any server-side coercions)
          this.original       = structuredClone(updated);
          this.edit           = structuredClone(updated);
          this._savedFeedback = true;
          setTimeout(() => { this._savedFeedback = false; }, 2000);

          Alpine.store('toast').success(`"${updated.service}" aggiornato.`);

        } catch (err) {
          // Detect 422 by message prefix (api.js throws Error(`HTTP ${status}`) or detail text)
          const is422 = /\b422\b/.test(err.message);

          if (is422) {
            // Rollback — UI returns to original state immediately, no persistent block
            this.edit = structuredClone(this.original);
            Alpine.store('toast').error(
              `Vincolo DB violato (…${this.edit.id.slice(-6)}): ${err.message}`
            );
          } else {
            // Non-422 error: preserve edit so the user can fix and retry
            Alpine.store('toast').error(`Errore di rete (…${this.edit.id.slice(-6)}): ${err.message}`);
          }

          // SECURITY: log only itemId fragment + message, never full payload
          console.error(`[catalog] PATCH failed id=…${this.edit.id.slice(-6)}`, err.message);

        } finally {
          this.isSaving = false;
        }
      },

    }; // return
  }; // rowComponent

</script>

<!-- Alpine CDN — deferred, loads after the module script above -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>

</body>
</html>
