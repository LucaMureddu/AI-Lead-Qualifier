# observability/grafana/provisioning/datasources/loki.yaml
# Auto-provisions Loki as the default datasource in Grafana.
# No manual setup required — Grafana picks this up on first boot.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: false
