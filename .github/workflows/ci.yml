name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: ogni Pull Request verso main + ogni push su main.
#
# Push su main è necessario perché deploy.yml usa `workflow_run` come gate:
# attende che CI completi con successo sul commit merged prima di deployare.
# Questo garantisce che non venga mai deployato codice che non ha passato
# tutti i check, anche se il deploy è su un file separato.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancella i run precedenti della stessa PR/branch appena ne parte uno nuovo.
# Su main (post-merge) non viene cancellato nulla: ogni commit è un gate
# indipendente per il deploy.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Job 1: Lint + type-check ─────────────────────────────────────────────────
  # Veloce (~60 s), nessuna I/O, nessun Docker.
  # Blocca gli altri job se fallisce (fail-fast implicito sulla PR).
  lint-and-type:
    name: "Lint & Type-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Ruff — lint
        run: ruff check .

      - name: Mypy — type-check
        # Copre i moduli applicativi V2; tests/ non è incluso di proposito
        # (i test usano fixture e mock tipizzati debolmente).
        run: mypy core agents ingestion adapters api database services worker


  # ── Job 2: Test veloci (unit + eval_ci) ─────────────────────────────────────
  # Esclude i test vector_store (che richiedono Docker + immagine pgvector).
  # Girano in parallelo con test-integration: feedback rapido su entrambi i fronti.
  test-fast:
    name: "Test — Unit + eval_ci"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Evita che structlog emetta colori ANSI che sporcano i log di GitHub.
      NO_COLOR: "1"
      # Permette a pytest-asyncio di operare senza avvertimenti sul loop scope.
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Generate JWT test keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out keys/private.pem
          openssl rsa -pubout -in keys/private.pem -out keys/public.pem
          chmod 600 keys/private.pem

      - name: Pytest — unit + eval_ci (no eval live, no vector_store)
        run: |
          pytest \
            -m "not eval and not vector_store" \
            --ignore=tests/evals \
            --ignore=tests/integration \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage to GitHub summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fast
          path: backend/coverage.xml
          retention-days: 7


  # ── Job 3: Test di integrazione pgvector (Testcontainers) ────────────────────
  # Avvia un container reale pgvector/pgvector:pg16 tramite Testcontainers.
  # Richiede Docker (disponibile su ubuntu-latest).
  # Valida:
  #   - Le migrazioni Alembic (001_initial_schema) contro un DB reale
  #   - L'isolamento multi-tenant nelle query pgvector (operatore <=>)
  #   - upsert_items, similarity_search, wipe_tenant con dati reali
  test-integration:
    name: "Test — Integration pgvector (Testcontainers)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      NO_COLOR: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Disabilita Ryuk (resource reaper di Testcontainers) su CI.
      # I container vengono comunque eliminati al termine del runner.
      TESTCONTAINERS_RYUK_DISABLED: "true"
      # Permette a Testcontainers di trovare il socket Docker del runner.
      DOCKER_HOST: "unix:///var/run/docker.sock"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Generate JWT test keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out keys/private.pem
          openssl rsa -pubout -in keys/private.pem -out keys/public.pem
          chmod 600 keys/private.pem

      # Pre-pull dell'immagine pgvector per ridurre la latenza del primo test.
      # Il layer cache di Docker persiste per la durata del job (non tra job).
      - name: Pre-pull pgvector Docker image
        run: docker pull pgvector/pgvector:pg16

      - name: Pytest — integration vector_store
        run: |
          pytest \
            -m "vector_store" \
            -v \
            --tb=short \
            -q

      # Log diagnostici in caso di fallimento: mostra i container ancora attivi.
      # Non stampa credenziali: `docker ps` mostra solo immagini e porte.
      - name: Debug — container attivi (solo su fallimento)
        if: failure()
        run: docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"


  # ── Job 4: E2E Frontend (Playwright) ────────────────────────────────────────
  # Il backend è mockato a livello di rete: nessun container applicativo avviato.
  frontend-e2e:
    name: "E2E — Frontend (Playwright)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright — E2E tests
        run: npx playwright test

      - name: Upload Playwright report (solo su fallimento)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
