name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + type-check ───────────────────────────────────────────────────────
  # Advisory all'inizio (continue-on-error): ruff/mypy non sono ancora stati
  # eseguiti su tutto il codebase. Quando sono puliti, rimuovere
  # `continue-on-error: true` per renderlo un gate bloccante.
  lint-and-type:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      - run: ruff check .
      - run: mypy core agents ingestion adapters api

  # ── Test backend (gate bloccante) ───────────────────────────────────────────
  # Esegue unit + integration + Binario A degli evals (eval_ci, model-free).
  # Gli eval LIVE (-m eval) NON girano in CI: niente LLM sui runner.
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      - run: pytest -m "not eval" --cov --cov-report=term-missing
