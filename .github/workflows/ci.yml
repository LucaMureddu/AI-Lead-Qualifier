name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + type-check ───────────────────────────────────────────────────────
  lint-and-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      - run: ruff check .
      - run: mypy core agents ingestion adapters api

  # ── Test backend (gate bloccante) ───────────────────────────────────────────
  # Esegue unit + integration + Binario A degli evals (eval_ci, model-free).
  # Gli eval LIVE (-m eval) NON girano in CI: niente LLM sui runner.
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt
      - run: pip install -r requirements-ci.txt
      - run: pytest -m "not eval" --cov --cov-report=term-missing

  # ── E2E frontend (Playwright; backend mockato a livello di rete) ─────────────
  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
