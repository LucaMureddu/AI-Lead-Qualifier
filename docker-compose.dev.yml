# docker-compose.dev.yml
# ─────────────────────────────────────────────────────────────────────────────
# Ambiente di Sviluppo Locale (Mac/Windows/Linux)
# 
# Modifiche rispetto alla prod:
# - NO Traefik (chiamate dirette alle porte)
# - Porte aperte per DB e Redis per ispezione
# - Volumi montati in tempo reale (Live Reload)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dev_postgres
    restart: unless-stopped
    ports:
      - "5432:5432" # Esporta per DBeaver/DataGrip
    environment:
      POSTGRES_DB: ai_lead_qualifier
      POSTGRES_USER: app
      # Usa un default semplice per lo sviluppo se .env manca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_lead_qualifier"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (ARQ broker) ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dev_redis
    restart: unless-stopped
    ports:
      - "6379:6379" # Esporta per ispezione GUI (es. RedisInsight)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: dev_backend
    restart: unless-stopped
    # Riavvia automaticamente FastAPI quando modifichi i file Python
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000" # Swagger raggiungibile su http://localhost:8000/docs
    env_file: .env
    environment:
      DATABASE_DSN: "postgresql://app:${POSTGRES_PASSWORD:-password}@postgres/ai_lead_qualifier"
      REDIS_DSN: "redis://redis:6379"
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      EMBEDDING_BASE_URL: "http://host.docker.internal:11434"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      # Sincronizza il tuo codice live nel container
      - ./backend:/app
      - uploads_data_dev:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── ARQ Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
    container_name: dev_worker
    command: python -m arq worker.worker_settings.WorkerSettings
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_DSN: "postgresql://app:${POSTGRES_PASSWORD:-password}@postgres/ai_lead_qualifier"
      REDIS_DSN: "redis://redis:6379"
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      EMBEDDING_BASE_URL: "http://host.docker.internal:11434"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      # Il worker vede subito le tue modifiche al codice
      - ./backend:/app
      - uploads_data_dev:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: dev_frontend
    restart: unless-stopped
    ports:
      - "80:80" # Interfaccia visibile su http://localhost
    depends_on:
      - backend

# ── Volumi (separati da quelli di prod) ─────────────────────────────────────────
volumes:
  postgres_data_dev:
  uploads_data_dev: