# pyproject.toml
# ---------------------------------------------------------------------------
# Configurazione di pytest e coverage per AI Lead Qualifier.
# Vedi TESTING_PLAN.md §2.2.
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
asyncio_mode = "auto"           # i test async non richiedono @pytest.mark.asyncio
asyncio_default_fixture_loop_scope = "function"   # pytest-asyncio >= 0.23: loop scope esplicito
testpaths = ["tests"]
# Gli eval LIVE (modello reale) sono esclusi di default con -m "not eval".
# --strict-markers fa fallire l'uso di marker non registrati qui sotto.
addopts = "-ra -q --strict-markers -m 'not eval and not eval_live'"
markers = [
    "unit: test puri e veloci, nessuna I/O",
    "integration: grafo/API con LLM e DB mockati",
    "vector_store: test di integrazione pgvector con container reale (testcontainers) — richiedono Docker",
    "eval_ci: evals model-free (deterministico + coseno) su generazioni registrate — girano in CI",
    "eval: evals LIVE col modello reale + giudice LLM — solo in locale, esclusi di default",
    "eval_live: evals LLM-as-a-judge sul motore pgvector V2 — solo in locale, richiede Ollama + Postgres con catalogo ingestito",
]
filterwarnings = [
    # Rumore da librerie terze — non sono bug nostri.
    "ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning",
    # testcontainers usa ResourceWarning per socket non chiusi in alcuni path di cleanup.
    "ignore::ResourceWarning",
]

[tool.coverage.run]
source = ["agents", "core", "ingestion", "adapters", "api"]
omit = ["tests/*", ".venv/*"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true   # niente stub per chromadb/langgraph/groq/llama-cpp

