# alembic.ini — V2
# ─────────────────────────────────────────────────────────────────────────────
# Comandi principali (eseguire dalla directory backend/):
#
#   alembic upgrade head          ← applica tutte le migrazioni in sospeso
#   alembic downgrade -1          ← rollback dell'ultima migrazione
#   alembic revision --autogenerate -m "descrizione"   ← nuova migrazione
#   alembic current               ← revisione attiva nel DB
#   alembic history               ← storico revisioni
#
# DATABASE_DSN viene letto dalla env (formato asyncpg postgresql://...).
# env.py converte in formato psycopg2 per Alembic.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Fallback URL: sovrascritto a runtime via DATABASE_DSN env var in env.py.
# Non usare questa URL in produzione: impostare DATABASE_DSN nell'ambiente.
sqlalchemy.url = postgresql+psycopg2://app:password@localhost/ai_lead_qualifier

[post_write_hooks]

# ── Logging ───────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
